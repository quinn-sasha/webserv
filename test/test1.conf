# 1.正常系テスト用（ポート 8080）
server {
    listen 8080;
    server_name localhost;
    root ./test_root;

    location / {
        allow_methods GET;
        index index.html;
    }
}

# 2.リダイレクトテスト用（ポート 8081）
server {
    listen 8081;
    server_name redirect.test;

    location /old-path {
        return 301 http://google.com;
    }
}

# 3.エラー系テスト用（ポート 8082）
server {
    listen 8082;
    server_name error.test;
    root ./empty_root;
}

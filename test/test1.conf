# 1.正常系テスト用（ポート 8080）
server {
    listen 8080;
    server_name localhost;

    location /test_root/ {
        allow_methods GET;
        root .;
        index index.html;
    }

    location /cgi-bin/ {
        allow_methods GET DELETE;
        root .;
        cgi_handler .pl /usr/bin/perl;
        cgi_handler .py /usr/bin/python3;
        cgi_handler .php /usr/bin/php-cgi;
    }

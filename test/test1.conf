# 1.正常系テスト用（ポート 8080）
server {
    listen 8080;
    server_name localhost;

    location /test_root/ {
        allow_methods GET;
        root ./;
        index index.html;
    }

    location /cgi-bin/ {
        allow_methods GET DELETE;
        root ./;
        cgi_handler .pl /usr/bin/perl;
        cgi_handler .py /usr/bin/python3;
    }
}

# 2.リダイレクトテスト用（ポート 8081）
server {
    listen 8081;
    server_name redirect.test;

    location /old-path {
        return 301 http://google.com;
    }
}

# 3.エラー系テスト用（ポート 8082）
server {
    listen 8082;
    server_name error.test;
    root ./empty_root;
}

# 4.エラー系テスト用 error_page（ポート 8083）
server {
    listen 8083;
    server_name error.test;
    error_page 404 /error.html;
    location /error.html {
        root ./test;
    }
}

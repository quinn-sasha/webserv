# 2.リダイレクトテスト用（ポート 8081）
server {
    listen 8081;
    server_name redirect.test;

    location /old-path {
        return 301 http://google.com;
    }
}

# 3.エラー系テスト用（ポート 8082）
server {
    listen 8082;
    server_name error.test;
    root ./empty_root;
}

# 4.エラー系テスト用 error_page（ポート 8083）
server {
    listen 8083;
    server_name error.test;
    error_page 404 /error.html;
    location /error.html {
        root ./test;
    }
}

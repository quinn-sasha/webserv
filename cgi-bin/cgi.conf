server {
    listen 8080;
    server_name cgi.test;

    location /get/ {
        allow_methods GET;
        root ./docs;
        index index.html;
    }

    location /cgi-bin/ {
        allow_methods GET POST DELETE;
        root .;
        cgi_handler .pl /usr/bin/perl;
        cgi_handler .py /usr/bin/python3;
        cgi_handler .php /usr/bin/php-cgi;
        cgi_handler .rb /usr/bin/ruby;
        cgi_handler .sh /bin/sh;
    }
}